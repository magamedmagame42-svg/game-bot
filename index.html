<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Премиум Шашки с Таймером</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; background: #161d22; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Segoe UI', sans-serif; user-select: none;
        }
        #top-bar {
            display: flex; justify-content: space-between; width: 90vw; max-width: 420px; margin-bottom: 5px;
        }
        #coin-bar {
            background: rgba(241, 196, 15, 0.15); border: 1px solid #f1c40f;
            padding: 6px 20px; border-radius: 20px; font-size: 15px; font-weight: bold;
            color: #f1c40f; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .info-panel { background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 12px; font-size: 13px; text-align: center; min-width: 80px; box-shadow: inset 0 1px 3px rgba(255,255,255,0.1); }
        .active-timer { background: #2e7d32 !important; animation: pulse-time 1s infinite alternate; }
        @keyframes pulse-time { from { opacity: 0.8; } to { opacity: 1; } }
        
        #status { font-size: 18px; margin-bottom: 12px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Реалистичная деревянная рамка для доски */
        .board-wrapper {
            display: grid; grid-template-columns: 20px 1fr 20px; grid-template-rows: 20px 1fr 20px;
            width: 92vw; height: 92vw; max-width: 400px; max-height: 400px;
            background: #2e3b4e; border-radius: 12px; padding: 6px; box-shadow: 0 16px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .labels-row { grid-column: 2; display: flex; justify-content: space-around; align-items: center; font-weight: bold; color: #94a3b8; font-size: 11px; }
        .labels-col { display: flex; flex-direction: column; justify-content: space-around; align-items: center; font-weight: bold; color: #94a3b8; font-size: 11px; }
        
        #board {
            grid-column: 2; grid-row: 2; display: grid; grid-template-columns: repeat(8, 1fr);
            border: 3px solid #1e293b; background-color: #1e293b; gap: 0; overflow: hidden; border-radius: 4px;
        }
        .cell { display: flex; align-items: center; justify-content: center; position: relative; }
        .dark { background-color: #b58863; }
        .light { background-color: #f0d9b5; }
        
        /* Гладкие объемные шашки без картинок */
        .piece {
            width: 82%; height: 82%; border-radius: 50%; cursor: pointer; position: relative;
            transition: transform 0.2s, box-shadow 0.2s; z-index: 2;
        }
        .white-piece { 
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e2e8f0 75%, #cbd5e1 100%);
            box-shadow: 0 5px 8px rgba(0,0,0,0.4), inset 0 -3px 4px rgba(0,0,0,0.2);
            border: 1px solid #b1b9c4;
        }
        .black-piece { 
            background: radial-gradient(circle at 30% 30%, #475569 0%, #1e293b 70%, #0f172a 100%);
            box-shadow: 0 5px 8px rgba(0,0,0,0.6), inset 0 -3px 5px rgba(0,0,0,0.6);
            border: 1px solid #090d14;
        }
        
        .king::after {
            content: "👑"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 18px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));
        }
        
        .selected { transform: scale(1.08); box-shadow: 0 0 18px #f59e0b, inset 0 -2px 4px rgba(0,0,0,0.3) !important; z-index: 3; }
        .must-hit { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 4px #ef4444; } 50% { box-shadow: 0 0 16px #ef4444; } 100% { box-shadow: 0 0 4px #ef4444; } }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="info-panel" id="white-panel">Белые ⚪<br><span id="white-time">15:00</span></div>
        <div class="info-panel">Съедено<br>⚪: <span id="white-captured">0</span> | ⚫: <span id="black-captured">0</span></div>
        <div class="info-panel" id="black-panel">Черные ⚫<br><span id="black-time">15:00</span></div>
    </div>
    
    <div id="coin-bar">🪙 Монеты: <span id="player-coins">0</span></div>
    
    <div id="status">Ход Белых</div>

    <div class="board-wrapper">
        <div class="labels-row"><div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div><div>H</div></div>
        <div class="labels-col" style="grid-row: 2; grid-column: 1;"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
        <div id="board"></div>
        <div class="labels-col" style="grid-row: 2; grid-column: 3;"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
        <div class="labels-row" style="grid-row: 3;"><div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div><div>H</div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        let gameMinutes = parseInt(urlParams.get('time')) || 15;
        let startCoins = urlParams.get('coins') || '0';
        
        document.getElementById('player-coins').innerText = startCoins;
        
        let turn = 'white';
        let selectedPiece = null;
        let whiteCaptured = 0;
        let blackCaptured = 0;
        let mustHitPieces = []; 
        let gameActive = true;

        let whiteTime = gameMinutes * 60;
        let blackTime = gameMinutes * 60;
        
        let boardState = Array(8).fill(null).map(() => Array(8).fill(null).map(() => ({type: '', isKing: false})));
        
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                if((r+c)%2 === 1) {
                    if(r < 3) boardState[r][c] = {type: 'B', isKing: false};
                    else if(r > 4) boardState[r][c] = {type: 'W', isKing: false};
                }
            }
        }

        setInterval(() => {
            if (!gameActive) return;
            if (turn === 'white') {
                whiteTime--;
                if(whiteTime <= 0) endGame('black', 'Время вышло! Победили Черные.');
            } else {
                blackTime--;
                if(blackTime <= 0) endGame('white', 'Время вышло! Победили Белые.');
            }
            updateTimerDisplay();
        }, 1000);

        function updateTimerDisplay() {
            const formatTime = (sec) => {
                let m = Math.floor(sec / 60); let s = sec % 60;
                return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };
            document.getElementById('white-time').innerText = formatTime(whiteTime);
            document.getElementById('black-time').innerText = formatTime(blackTime);
            
            document.getElementById('white-panel').className = `info-panel ${turn==='white'?'active-timer':''}`;
            document.getElementById('black-panel').className = `info-panel ${turn==='black'?'active-timer':''}`;
        }

        function checkMustHit() {
            mustHitPieces = [];
            const currentType = turn === 'white' ? 'W' : 'B';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c].type === currentType && canCapture(r, c)) {
                        mustHitPieces.push({ r, c });
                    }
                }
            }
        }

        function canCapture(r, c) {
            const piece = boardState[r][c];
            const enemyType = piece.type === 'W' ? 'B' : 'W';
            const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];

            if (piece.isKing) {
                for (let d of dirs) {
                    let step = 1; let foundEnemy = null;
                    while (true) {
                        let nr = r + d[0]*step; let nc = c + d[1]*step;
                        if (nr<0||nr>=8||nc<0||nc>=8) break;
                        let target = boardState[nr][nc];
                        if (target.type === piece.type) break;
                        if (target.type === enemyType) {
                            if (foundEnemy) break;
                            foundEnemy = {r: nr, c: nc};
                        } else if (target.type === '') {
                            if (foundEnemy) return true;
                        }
                        step++;
                    }
                }
            } else {
                for (let d of dirs) {
                    let midR = r + d[0]; let midC = c + d[1];
                    let endR = r + d[0]*2; let endC = c + d[1]*2;
                    if (endR>=0 && endR<8 && endC>=0 && endC<8) {
                        if (boardState[midR][midC].type === enemyType && boardState[endR][endC].type === '') return true;
                    }
                }
            }
            return false;
        }

        function drawBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            if (gameActive) checkMustHit();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 1 ? 'dark' : 'light'}`;

                    const cellData = boardState[r][c];
                    if (cellData.type) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${cellData.type === 'W' ? 'white-piece' : 'black-piece'}`;
                        if (cellData.isKing) piece.classList.add('king');
                        
                        const isObligated = mustHitPieces.some(p => p.r === r && p.c === c);
                        if (isObligated) piece.classList.add('must-hit');
                        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) piece.classList.add('selected');

                        piece.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (!gameActive) return;
                            if (mustHitPieces.length > 0 && !isObligated) {
                                alert("Обязательно нужно бить подсвеченную шашку!");
                                return;
                            }
                            if ((turn === 'white' && cellData.type === 'W') || (turn === 'black' && cellData.type === 'B')) {
                                selectedPiece = { row: r, col: c };
                                drawBoard();
                            }
                        });
                        cell.appendChild(piece);
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
            document.getElementById('white-captured').innerText = whiteCaptured;
            document.getElementById('black-captured').innerText = blackCaptured;
            updateTimerDisplay();
        }

        function handleCellClick(r, c) {
            if (!selectedPiece || !gameActive) return;
            
            const fromR = selectedPiece.row;
            const fromC = selectedPiece.col;
            const pData = boardState[fromR][fromC];
            const rowDiff = r - fromR;
            const colDiff = Math.abs(c - fromC);
            
            if (boardState[r][c].type !== '' || (r + c) % 2 === 0) return;

            if (pData.isKing) {
                if (Math.abs(rowDiff) === colDiff) {
                    let dirR = rowDiff / Math.abs(rowDiff);
                    let dirC = (c - fromC) / colDiff;
                    let step = 1; let enemies = [];
                    
                    while (step < colDiff) {
                        let checkR = fromR + dirR*step;
                        let checkC = fromC + dirC*step;
                        if (boardState[checkR][checkC].type !== '') enemies.push({r: checkR, c: checkC});
                        step++;
                    }

                    if (enemies.length === 0 && mustHitPieces.length === 0) {
                        movePiece(fromR, fromC, r, c);
                        endTurn();
                    } else if (enemies.length === 1 && boardState[enemies[0].r][enemies[0].c].type !== pData.type) {
                        boardState[enemies[0].r][enemies[0].c] = {type: '', isKing: false};
                        if (turn === 'white') blackCaptured++; else whiteCaptured++;
                        movePiece(fromR, fromC, r, c);
                        
                        if (canCapture(r, c)) { selectedPiece = { row: r, col: c }; drawBoard(); }
                        else { checkGameOver(); endTurn(); }
                    }
                }
                return;
            }

            if (mustHitPieces.length > 0 && Math.abs(rowDiff) !== 2) return;

            if (mustHitPieces.length === 0 && ((turn === 'white' && rowDiff === -1 && colDiff === 1) || (turn === 'black' && rowDiff === 1 && colDiff === 1))) {
                movePiece(fromR, fromC, r, c);
                endTurn();
            }
            else if (Math.abs(rowDiff) === 2 && colDiff === 2) {
                const midR = (fromR + r) / 2;
                const midC = (fromC + c) / 2;
                const enemyType = turn === 'white' ? 'B' : 'W';
                
                if (boardState[midR][midC].type === enemyType) {
                    boardState[midR][midC] = {type: '', isKing: false};
                    if (turn === 'white') blackCaptured++; else whiteCaptured++;
                    movePiece(fromR, fromC, r, c);
                    
                    if (canCapture(r, c)) { selectedPiece = { row: r, col: c }; drawBoard(); }
                    else { checkGameOver(); endTurn(); }
                }
            }
        }

        function movePiece(fromR, fromC, r, c) {
            boardState[r][c] = boardState[fromR][fromC];
            boardState[fromR][fromC] = {type: '', isKing: false};
            
            if (boardState[r][c].type === 'W' && r === 0) boardState[r][c].isKing = true;
            if (boardState[r][c].type === 'B' && r === 7) boardState[r][c].isKing = true;
        }

        function endTurn() {
            selectedPiece = null;
            turn = turn === 'white' ? 'black' : 'white';
            document.getElementById('status').innerText = turn === 'white' ? 'Ход Белых' : 'Ход Черных';
            drawBoard();
        }

        function checkGameOver() {
            let w = 0, b = 0;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(boardState[r][c].type === 'W') w++;
                    if(boardState[r][c].type === 'B') b++;
                }
            }
            if (w === 0) endGame('black', 'Черные съели все шашки!');
            if (b === 0) endGame('white', 'Белые съели все шашки!');
        }

        function endGame(winner, msg) {
            gameActive = false;
            alert(msg);
            tg.sendData(JSON.stringify({ winner: winner }));
            tg.close();
        }

        drawBoard();
    </script>
</body>
</html>
