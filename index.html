<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шашки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; background: #2c3e50; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: sans-serif; user-select: none;
        }
        #status { font-size: 18px; margin-bottom: 15px; font-weight: bold; }
        #board {
            display: grid; grid-template-columns: repeat(8, 1fr);
            width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            border: 4px solid #1a252f; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .cell {
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .piece {
            width: 80%; height: 80%; border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer; transition: transform 0.2s;
        }
        .white-piece { background: #ffffff; border: 2px solid #ccc; }
        .black-piece { background: #cc0000; border: 2px solid #800000; }
        .selected { transform: scale(1.1); border: 3px solid #f1c40f !important; }
    </style>
</head>
<body>

    <div id="status">Ход Белых</div>
    <div id="board"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем на весь экран

        let turn = 'white';
        let selectedPiece = null;
        
        // Начальное состояние доски
        let boardState = [
            ['', 'B', '', 'B', '', 'B', '', 'B'],
            ['B', '', 'B', '', 'B', '', 'B', ''],
            ['', 'B', '', 'B', '', 'B', '', 'B'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['W', '', 'W', '', 'W', '', 'W', ''],
            ['', 'W', '', 'W', '', 'W', '', 'W'],
            ['W', '', 'W', '', 'W', '', 'W', '']
        ];

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');

        function drawBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const type = boardState[r][c];
                    if (type) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${type === 'W' ? 'white-piece' : 'black-piece'}`;
                        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                            piece.classList.add('selected');
                        }
                        piece.addEventListener('click', (e) => {
                            e.stopPropagation();
                            handlePieceClick(r, c);
                        });
                        cell.appendChild(piece);
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
        }

        function handlePieceClick(r, c) {
            const p = boardState[r][c];
            if ((turn === 'white' && p === 'W') || (turn === 'black' && p === 'B')) {
                selectedPiece = { row: r, col: c };
                drawBoard();
            }
        }

        function handleCellClick(r, c) {
            if (!selectedPiece) return;
            
            const fromR = selectedPiece.row;
            const fromC = selectedPiece.col;
            
            // Самая базовая проверка хода по диагонали на пустую клетку
            const rowDiff = r - fromR;
            const colDiff = Math.abs(c - fromC);
            
            if (boardState[r][c] === '' && (r + c) % 2 !== 0) {
                // Обычный ход
                if ((turn === 'white' && rowDiff === -1 && colDiff === 1) || 
                    (turn === 'black' && rowDiff === 1 && colDiff === 1)) {
                    
                    boardState[r][c] = boardState[fromR][fromC];
                    boardState[fromR][fromC] = '';
                    endTurn();
                }
                // Ход со взятием фигуры
                else if (Math.abs(rowDiff) === 2 && colDiff === 2) {
                    const midR = (fromR + r) / 2;
                    const midC = (fromC + c) / 2;
                    const midPiece = boardState[midR][midC];
                    
                    if ((turn === 'white' && midPiece === 'B') || (turn === 'black' && midPiece === 'W')) {
                        boardState[midR][midC] = '';
                        boardState[r][c] = boardState[fromR][fromC];
                        boardState[fromR][fromC] = '';
                        
                        // Проверяем победу
                        checkGameOver();
                        endTurn();
                    }
                }
            }
        }

        function endTurn() {
            selectedPiece = null;
            turn = turn === 'white' ? 'black' : 'white';
            statusEl.innerText = turn === 'white' ? 'Ход Белых' : 'Ход Черных';
            drawBoard();
        }

        function checkGameOver() {
            let w = 0, b = 0;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(boardState[r][c] === 'W') w++;
                    if(boardState[r][c] === 'B') b++;
                }
            }
            if (w === 0 || b === 0) {
                alert("Игра окончена!");
                // Отправляем боту сигнал о завершении игры, чтобы начислить монеты
                tg.sendData(JSON.stringify({ winner: w === 0 ? 'black' : 'white' }));
                tg.close();
            }
        }

        drawBoard();
    </script>
</body>
</html>
