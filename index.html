<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Премиум Шашки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; background: #1e272e; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none;
        }
        #score-board {
            display: flex; gap: 20px; font-size: 16px; margin-bottom: 10px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px;
        }
        #status { font-size: 18px; margin-bottom: 15px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* Контейнер доски с разметкой */
        .board-wrapper {
            display: grid;
            grid-template-columns: 30px 1fr 30px;
            grid-template-rows: 30px 1fr 30px;
            width: 92vw; height: 92vw; max-width: 420px; max-height: 420px;
            background: #2c3e50; border-radius: 8px; padding: 5px; box-shadow: 0 12px 30px rgba(0,0,0,0.7);
        }
        .labels-row { grid-column: 2; display: flex; justify-content: space-around; align-items: center; font-weight: bold; color: #bdc3c7; }
        .labels-col { display: flex; flex-direction: column; justify-content: space-around; align-items: center; font-weight: bold; color: #bdc3c7; }
        
        #board {
            grid-column: 2; grid-row: 2;
            display: grid; grid-template-columns: repeat(8, 1fr);
            background-image: url('https://images.unsplash.com/photo-1529699211952-734e80c4d42b?q=80&w=500');
            background-size: cover; border: 2px solid #111;
        }
        .cell { display: flex; align-items: center; justify-content: center; position: relative; }
        .dark { background-color: rgba(141, 103, 72, 0.85); }
        .light { background-color: rgba(243, 226, 199, 0.85); }
        
        .piece {
            width: 84%; height: 84%; border-radius: 50%;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            background-size: cover; background-position: center;
            box-shadow: 0 6px 10px rgba(0,0,0,0.6), inset 0 -4px 6px rgba(0,0,0,0.4);
        }
        .white-piece { border: 1px solid #fff; }
        /* Теперь обводка для черных шашек более контрастная */
        .black-piece { border: 1px solid #444; }
        
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #f1c40f, inset 0 -4px 6px rgba(0,0,0,0.4) !important; }
        .must-hit { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px #e74c3c; }
            50% { box-shadow: 0 0 18px #e74c3c; }
            100% { box-shadow: 0 0 5px #e74c3c; }
        }
    </style>
</head>
<body>

    <div id="score-board">
        <div>Съедено ⚪: <span id="white-captured">0</span>/12</div>
        <div>Съедено ⚫: <span id="black-captured">0</span>/12</div>
    </div>
    <div id="status">Ход Белых</div>

    <div class="board-wrapper">
        <div class="labels-row"><div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div><div>H</div></div>
        <div class="labels-col" style="grid-row: 2; grid-column: 1;"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
        
        <div id="board"></div>
        
        <div class="labels-col" style="grid-row: 2; grid-column: 3;"><div>8</div><div>7</div><div>6</div><div>5</div><div>4</div><div>3</div><div>2</div><div>1</div></div>
        <div class="labels-row" style="grid-row: 3;"><div>A</div><div>B</div><div>C</div><div>D</div><div>E</div><div>F</div><div>G</div><div>H</div></div>
    </div>

    <script>
        // === НАСТРОЙКА ТВОИХ ФОТО ДЛЯ ШАШЕК И ДОСКИ ===
        const URL_WHITE_PIECE = 'https://images.unsplash.com/photo-1611195974226-a6a9be9dd763?q=80&w=100'; 
        // Здесь мы заменили яркое красное фото на текстуру стильного темного дерева/камня
        const URL_BLACK_PIECE = 'https://images.unsplash.com/photo-1510218830377-1e93e58416c4?q=80&w=100'; 

        const tg = window.Telegram.WebApp;
        tg.expand();

        let turn = 'white';
        let selectedPiece = null;
        let whiteCaptured = 0;
        let blackCaptured = 0;
        let mustHitPieces = []; 
        
        let boardState = [
            ['', 'B', '', 'B', '', 'B', '', 'B'],
            ['B', '', 'B', '', 'B', '', 'B', ''],
            ['', 'B', '', 'B', '', 'B', '', 'B'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['W', '', 'W', '', 'W', '', 'W', ''],
            ['', 'W', '', 'W', '', 'W', '', 'W'],
            ['W', '', 'W', '', 'W', '', 'W', '']
        ];

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');

        function checkMustHit() {
            mustHitPieces = [];
            const currentType = turn === 'white' ? 'W' : 'B';
            const enemyType = turn === 'white' ? 'B' : 'W';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] === currentType) {
                        if (canCapture(r, c, enemyType)) {
                            mustHitPieces.push({ r, c });
                        }
                    }
                }
            }
        }

        function canCapture(r, c, enemyType) {
            const directions = [[-2, -2], [-2, 2], [2, -2], [2, 2]];
            for (let d of directions) {
                const targetR = r + d[0];
                const targetC = c + d[1];
                const midR = r + d[0]/2;
                const midC = c + d[1]/2;

                if (targetR >= 0 && targetR < 8 && targetC >= 0 && targetC < 8) {
                    if (boardState[midR][midC] === enemyType && boardState[targetR][targetC] === '') {
                        return true;
                    }
                }
            }
            return false;
        }

        function drawBoard() {
            boardEl.innerHTML = '';
            checkMustHit();

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;

                    const type = boardState[r][c];
                    if (type) {
                        const piece = document.createElement('div');
                        piece.className = `piece ${type === 'W' ? 'white-piece' : 'black-piece'}`;
                        
                        piece.style.backgroundImage = `url(${type === 'W' ? URL_WHITE_PIECE : URL_BLACK_PIECE})`;

                        const isObligated = mustHitPieces.some(p => p.r === r && p.c === c);
                        if (isObligated) piece.classList.add('must-hit');

                        if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                            piece.classList.add('selected');
                        }

                        piece.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (mustHitPieces.length > 0 && !isObligated) {
                                alert("Обязательно нужно бить подсвеченную шашку!");
                                return;
                            }
                            handlePieceClick(r, c);
                        });
                        cell.appendChild(piece);
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
            
            document.getElementById('white-captured').innerText = whiteCaptured;
            document.getElementById('black-captured').innerText = blackCaptured;
        }

        function handlePieceClick(r, c) {
            const p = boardState[r][c];
            if ((turn === 'white' && p === 'W') || (turn === 'black' && p === 'B')) {
                selectedPiece = { row: r, col: c };
                drawBoard();
            }
        }

        function handleCellClick(r, c) {
            if (!selectedPiece) return;
            
            const fromR = selectedPiece.row;
            const fromC = selectedPiece.col;
            const rowDiff = r - fromR;
            const colDiff = Math.abs(c - fromC);
            
            if (boardState[r][c] === '' && (r + c) % 2 !== 0) {
                if (mustHitPieces.length > 0 && Math.abs(rowDiff) !== 2) {
                    alert("Ход невозможен! Вы обязаны бить фигуру соперника.");
                    return;
                }

                if (mustHitPieces.length === 0 && ((turn === 'white' && rowDiff === -1 && colDiff === 1) || (turn === 'black' && rowDiff === 1 && colDiff === 1))) {
                    boardState[r][c] = boardState[fromR][fromC];
                    boardState[fromR][fromC] = '';
                    endTurn();
                }
                else if (Math.abs(rowDiff) === 2 && colDiff === 2) {
                    const midR = (fromR + r) / 2;
                    const midC = (fromC + c) / 2;
                    const midPiece = boardState[midR][midC];
                    const enemyType = turn === 'white' ? 'B' : 'W';
                    
                    if (midPiece === enemyType) {
                        boardState[midR][midC] = '';
                        boardState[r][c] = boardState[fromR][fromC];
                        boardState[fromR][fromC] = '';
                        
                        if (turn === 'white') blackCaptured++; else whiteCaptured++;
                        
                        if (canCapture(r, c, enemyType)) {
                            selectedPiece = { row: r, col: c };
                            drawBoard();
                        } else {
                            checkGameOver();
                            endTurn();
                        }
                    }
                }
            }
        }

        function endTurn() {
            selectedPiece = null;
            turn = turn === 'white' ? 'black' : 'white';
            statusEl.innerText = turn === 'white' ? 'Ход Белых' : 'Ход Черных';
            drawBoard();
        }

        function checkGameOver() {
            let w = 0, b = 0;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(boardState[r][c] === 'W') w++;
                    if(boardState[r][c] === 'B') b++;
                }
            }
            if (w === 0 || b === 0) {
                alert("Победа!");
                tg.sendData(JSON.stringify({ winner: w === 0 ? 'black' : 'white' }));
                tg.close();
            }
        }

        drawBoard();
    </script>
</body>
</html>
